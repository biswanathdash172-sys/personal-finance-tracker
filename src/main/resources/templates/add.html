<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Add Transaction — Personal Finance Tracker</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(99,102,241,0.3);
        }
        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        header a.btn-back {
            color: #a5b4fc;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: color 0.15s;
        }
        header a.btn-back:hover { color: #c7d2fe; }

        main {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 3rem 1.5rem;
        }

        .card {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 18px;
            padding: 2.5rem 2.5rem;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #c7d2fe;
            margin-bottom: 0.25rem;
        }
        .card-subtitle {
            font-size: 0.82rem;
            color: #475569;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.4rem;
        }
        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #94a3b8;
            margin-bottom: 0.45rem;
        }
        input, select, textarea {
            width: 100%;
            background: #0f0f1a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 9px;
            padding: 0.7rem 1rem;
            color: #e2e8f0;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
        }
        input[type="number"] { -moz-appearance: textfield; }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

        textarea { resize: vertical; min-height: 80px; }

        select option { background: #1a1a2e; }

        /* Type toggle */
        .type-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }
        .type-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.75rem;
            border-radius: 9px;
            border: 2px solid rgba(255,255,255,0.08);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .type-label:has(input:checked).income-label {
            border-color: #10b981;
            background: rgba(16,185,129,0.12);
            color: #34d399;
        }
        .type-label:has(input:checked).expense-label {
            border-color: #ef4444;
            background: rgba(239,68,68,0.12);
            color: #f87171;
        }
        .type-label:not(:has(input:checked)) { color: #64748b; }
        .type-label input[type="radio"] { display: none; }

        /* Error messages */
        .field-error {
            color: #f87171;
            font-size: 0.78rem;
            margin-top: 0.35rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 15px rgba(124,58,237,0.4);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(124,58,237,0.55);
        }
        .btn-submit:active { transform: translateY(0); }

        footer {
            text-align: center;
            padding: 1.5rem;
            color: #334155;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header>
    <h1>💰 Personal Finance Tracker</h1>
    <a class="btn-back" href="/">← Back to Home</a>
</header>

<main>
    <div class="card">
        <div class="card-title">Add Transaction</div>
        <div class="card-subtitle">Record a new income or expense entry</div>

        <form th:action="@{/add}" th:object="${transaction}" method="post" novalidate>

            <!-- Type -->
            <div class="form-group">
                <label>Transaction Type</label>
                <div class="type-group">
                    <label class="type-label income-label">
                        <input type="radio" th:field="*{type}" value="INCOME"/>
                        ↑ Income
                    </label>
                    <label class="type-label expense-label">
                        <input type="radio" th:field="*{type}" value="EXPENSE"/>
                        ↓ Expense
                    </label>
                </div>
                <div class="field-error" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
            </div>

            <!-- Amount + Date -->
            <div class="form-row">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number"
                           id="amount"
                           th:field="*{amount}"
                           placeholder="0.00"
                           step="0.01"
                           min="0.01"/>
                    <div class="field-error" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date"
                           id="date"
                           th:field="*{date}"/>
                    <div class="field-error" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
                </div>
            </div>

            <!-- Category -->
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" th:field="*{category}">
                    <option value="" disabled selected>Select a category…</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat}"
                            th:text="${cat}"></option>
                </select>
                <div class="field-error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
            </div>

            <!-- Note -->
            <div class="form-group">
                <label for="note">Note (optional)</label>
                <textarea id="note"
                          th:field="*{note}"
                          placeholder="Add a description…"></textarea>
            </div>

            <button type="submit" class="btn-submit">💾 Save Transaction</button>

        </form>
    </div>
</main>

<footer>Personal Finance Tracker &copy; 2024 — powered by Spring Boot &amp; H2</footer>

</body>
</html>
